<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>U.S. Pool & Hot Tub Dealer Map — King Technology / FROG Intelligence</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.31/"></script>
  <script type="module" src="https://js.arcgis.com/calcite-components/2.13.2/calcite.esm.js"></script>
  <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/2.13.2/calcite.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="calcite-mode-dark">
  <calcite-shell>

    <calcite-navigation slot="header">
      <calcite-navigation-logo slot="logo"
        heading="FROG Dealer Intelligence"
        description="King Technology — Dealer & Product Coverage"
        icon="map-pin">
      </calcite-navigation-logo>
      <div slot="content-end" class="header-actions">
        <calcite-action id="btn-zoom-all" icon="zoom-to-object" text="Zoom to all" scale="s"></calcite-action>
        <calcite-action id="btn-toggle-cluster" icon="clustering" text="Enable clustering" scale="s"></calcite-action>
        <calcite-action id="btn-toggle-heat" icon="layer-heat-map" text="Heatmap" scale="s"></calcite-action>
        <calcite-action id="btn-toggle-frog" icon="binoculars" text="FROG dealers only" scale="s"></calcite-action>
        <calcite-chip id="dealer-count-chip" kind="brand" scale="s" icon="pin">Loading...</calcite-chip>
        <calcite-chip id="frog-count-chip" kind="inverse" scale="s" icon="check-circle" style="display:none">0 FROG</calcite-chip>
      </div>
    </calcite-navigation>

    <!-- Mobile toggle -->
    <calcite-fab id="mobile-panel-toggle" class="mobile-only" icon="graph-bar" text="Stats" text-enabled scale="l"></calcite-fab>

    <!-- Left Panel: Statistics (clickable to filter) -->
    <calcite-shell-panel slot="panel-start" id="stats-panel" width-scale="s" position="start">

      <calcite-panel heading="Dashboard">

        <!-- Search -->
        <calcite-block heading="Search" open collapsible>
          <calcite-icon slot="icon" icon="search" scale="s"></calcite-icon>
          <calcite-input-text id="search-input" placeholder="Search name, city, state..." clearable icon="search" scale="s"></calcite-input-text>
        </calcite-block>

        <!-- Active Filters -->
        <div id="active-filters" class="active-filters" style="display:none">
          <div class="active-filters-header">
            <span class="active-filters-label">Active Filters</span>
            <calcite-button id="btn-clear-all" kind="danger" appearance="outline" scale="s" icon-start="reset">Clear All</calcite-button>
          </div>
          <div id="active-filter-chips" class="active-filter-chips"></div>
        </div>

        <!-- FROG Coverage -->
        <calcite-block heading="FROG Coverage" open collapsible>
          <calcite-icon slot="icon" icon="check-circle" scale="s"></calcite-icon>
          <div id="stats-frog-summary" class="stats-container"></div>
        </calcite-block>

        <!-- By FROG Confidence -->
        <calcite-block heading="By FROG Status" collapsible>
          <calcite-icon slot="icon" icon="binoculars" scale="s"></calcite-icon>
          <div id="stats-frog-confidence" class="stats-container"></div>
        </calcite-block>

        <!-- By Channel -->
        <calcite-block heading="By Channel" open collapsible>
          <calcite-icon slot="icon" icon="switch" scale="s"></calcite-icon>
          <div id="stats-channel" class="stats-container"></div>
        </calcite-block>

        <!-- By Dealer Type -->
        <calcite-block heading="By Dealer Type" collapsible>
          <calcite-icon slot="icon" icon="organization" scale="s"></calcite-icon>
          <div id="stats-type" class="stats-container"></div>
        </calcite-block>

        <!-- By Company -->
        <calcite-block heading="By Company" collapsible>
          <calcite-icon slot="icon" icon="label" scale="s"></calcite-icon>
          <div id="stats-company" class="stats-container"></div>
        </calcite-block>

        <!-- By State -->
        <calcite-block heading="By State" collapsible>
          <calcite-icon slot="icon" icon="map" scale="s"></calcite-icon>
          <div id="stats-states" class="stats-container"></div>
        </calcite-block>

        <!-- Summary -->
        <calcite-block heading="Coverage Summary" collapsible>
          <calcite-icon slot="icon" icon="graph-bar" scale="s"></calcite-icon>
          <div id="stats-summary" class="stats-container"></div>
        </calcite-block>

      </calcite-panel>
    </calcite-shell-panel>

    <!-- Map -->
    <div id="viewDiv"></div>

    <!-- Right Panel: Dealer Details (shown on click) -->
    <calcite-shell-panel slot="panel-end" width-scale="m" position="end" collapsed id="detail-panel">
      <calcite-panel heading="Dealer Details" id="detail-content">
        <calcite-action slot="header-actions-end" icon="x" text="Close" id="btn-close-detail"></calcite-action>
        <div id="dealer-detail-body">
          <calcite-notice open icon="cursor-click" kind="brand">
            <div slot="message">Click a dealer on the map to view details.</div>
          </calcite-notice>
        </div>
      </calcite-panel>
    </calcite-shell-panel>

  </calcite-shell>

  <script src="dealers-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
