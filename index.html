<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U.S. Pool & Hot Tub Dealer Map — King Technology Intelligence</title>

  <!-- ArcGIS Maps SDK 4.31 -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.31/"></script>

  <!-- Calcite Design System -->
  <script type="module" src="https://js.arcgis.com/calcite-components/2.13.2/calcite.esm.js"></script>
  <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/2.13.2/calcite.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="calcite-mode-dark">
  <calcite-shell>

    <!-- Header -->
    <calcite-navigation slot="header">
      <calcite-navigation-logo
        slot="logo"
        heading="U.S. Pool & Hot Tub Dealer Intelligence"
        description="King Technology — Competitive Landscape Mapping"
        icon="map-pin"
      ></calcite-navigation-logo>
      <calcite-action-pad slot="content-end" layout="horizontal" expand-disabled>
        <calcite-action id="btn-zoom-all" icon="zoom-to-object" text="Zoom to all"></calcite-action>
        <calcite-action id="btn-toggle-cluster" icon="clustering" text="Toggle clustering"></calcite-action>
        <calcite-action id="btn-toggle-heat" icon="layer-heat-map" text="Heatmap"></calcite-action>
      </calcite-action-pad>
      <calcite-chip slot="content-end" id="dealer-count-chip" kind="brand" scale="l" icon="pin">Loading...</calcite-chip>
    </calcite-navigation>

    <!-- Left Panel: Filters -->
    <calcite-shell-panel slot="panel-start" width-scale="m" position="start">
      <calcite-action-bar slot="action-bar">
        <calcite-action data-action-id="filters" icon="filter" text="Filters"></calcite-action>
        <calcite-action data-action-id="legend" icon="legend" text="Legend"></calcite-action>
        <calcite-action data-action-id="stats" icon="graph-bar" text="Statistics"></calcite-action>
      </calcite-action-bar>

      <!-- Filters Panel -->
      <calcite-panel heading="Filters" data-panel-id="filters">
        <calcite-block heading="Search" open collapsible>
          <calcite-icon slot="icon" icon="search" scale="s"></calcite-icon>
          <calcite-input-text id="search-input" placeholder="Search by name, city, state..." clearable icon="search"></calcite-input-text>
        </calcite-block>

        <calcite-block heading="Dealer Type" open collapsible>
          <calcite-icon slot="icon" icon="organization" scale="s"></calcite-icon>
          <div id="type-filters" class="filter-group"></div>
        </calcite-block>

        <calcite-block heading="Company / Brand" open collapsible>
          <calcite-icon slot="icon" icon="label" scale="s"></calcite-icon>
          <div id="company-filters" class="filter-group"></div>
        </calcite-block>

        <calcite-block heading="Products" open collapsible>
          <calcite-icon slot="icon" icon="shopping-cart" scale="s"></calcite-icon>
          <div id="product-filters" class="filter-group"></div>
        </calcite-block>

        <calcite-block heading="State" collapsible>
          <calcite-icon slot="icon" icon="map" scale="s"></calcite-icon>
          <calcite-combobox id="state-filter" placeholder="Filter by state" selection-mode="multiple" scale="s">
          </calcite-combobox>
        </calcite-block>

        <div class="filter-actions">
          <calcite-button id="btn-apply-filters" kind="brand" width="full" icon-start="filter">Apply Filters</calcite-button>
          <calcite-button id="btn-clear-filters" kind="neutral" width="full" icon-start="reset" appearance="outline">Clear All</calcite-button>
        </div>
      </calcite-panel>

      <!-- Legend Panel -->
      <calcite-panel heading="Legend" data-panel-id="legend" hidden>
        <div id="legend-container" class="legend-grid"></div>
      </calcite-panel>

      <!-- Stats Panel -->
      <calcite-panel heading="Statistics" data-panel-id="stats" hidden>
        <calcite-block heading="By Dealer Type" open collapsible>
          <div id="stats-type" class="stats-container"></div>
        </calcite-block>
        <calcite-block heading="By Company" open collapsible>
          <div id="stats-company" class="stats-container"></div>
        </calcite-block>
        <calcite-block heading="Top States" open collapsible>
          <div id="stats-states" class="stats-container"></div>
        </calcite-block>
        <calcite-block heading="Coverage Summary" open collapsible>
          <div id="stats-summary" class="stats-container"></div>
        </calcite-block>
      </calcite-panel>
    </calcite-shell-panel>

    <!-- Map -->
    <div id="viewDiv"></div>

    <!-- Right Panel: Dealer Details -->
    <calcite-shell-panel slot="panel-end" width-scale="m" position="end" collapsed id="detail-panel">
      <calcite-panel heading="Dealer Details" id="detail-content">
        <calcite-action slot="header-actions-end" icon="x" text="Close" id="btn-close-detail"></calcite-action>
        <div id="dealer-detail-body">
          <calcite-notice open icon="cursor-click" kind="brand">
            <div slot="message">Click a dealer on the map to view details.</div>
          </calcite-notice>
        </div>
      </calcite-panel>
    </calcite-shell-panel>

  </calcite-shell>

  <!-- Data must load BEFORE app.js -->
  <script src="dealers-data.js"></script>
  <!-- App uses ArcGIS AMD require() — must be a regular script, NOT module -->
  <script src="app.js"></script>
</body>
</html>
